name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install -e 'apps/api[dev,agents]'
      - run: npm run check
      - run: npm run build
      - run: npm test
        env:
          MEMORY_BACKEND: seeded
      - run: python -m ruff check apps/api/src apps/api/tests
      - run: npm audit --audit-level=high
      - run: python -m pip install pip-audit && python -m pip_audit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage.xml
            apps/web/coverage/coverage-summary.json
